<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gripi</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #18181e;
        color: #f1f1f4;
      }

      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }

      #tabs {
        display: flex;
        flex-shrink: 0;
        align-items: center;
        gap: 6px;
        height: 40px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 0 10px;
        border-bottom: 1px solid #30303a;
        background: #202028;
      }

      #tabs[hidden] {
        display: none;
      }

      .tab {
        flex: 0 1 220px;
        min-width: 44px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border: 0;
        border-radius: 999px;
        padding: 7px 12px;
        background: transparent;
        color: #c8c8d0;
        cursor: pointer;
      }

      .tab.active {
        background: #353542;
        color: #f1f1f4;
      }

      #content {
        position: relative;
        flex: 1;
        min-height: 0;
      }

      webview {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      webview[hidden] {
        display: none;
      }

      .panel {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        overflow: auto;
        padding: 24px;
        background: #18181e;
      }

      .card {
        box-sizing: border-box;
        width: min(680px, 100%);
        padding: 32px;
        border: 1px solid #3a3a46;
        border-radius: 18px;
        background: #22222b;
        box-shadow: 0 24px 80px rgb(0 0 0 / 35%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
      }

      p {
        color: #c8c8d0;
        line-height: 1.5;
      }

      label {
        display: block;
        margin-top: 18px;
        color: #f1f1f4;
        font-weight: 700;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        margin: 8px 0 4px;
        padding: 12px 14px;
        border: 1px solid #3a3a46;
        border-radius: 10px;
        background: #111116;
        color: #f1f1f4;
        font: inherit;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      button.primary {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        background: #ff5a1f;
        color: #111116;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        border: 1px solid #3a3a46;
        border-radius: 999px;
        padding: 9px 17px;
        background: transparent;
        color: #f1f1f4;
        font-weight: 700;
        cursor: pointer;
      }

      .muted {
        color: #9999a6;
        font-size: 0.9rem;
      }

      .error {
        min-height: 1.2em;
        color: #ff9f9f;
      }

      @media (max-height: 520px) {
        .panel {
          place-items: start center;
          padding-block: 12px;
        }

        .card {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <nav id="tabs" hidden></nav>
    <main id="content"></main>
    <script src="shell.js"></script>
  </body>
</html>
