[tools]
ruby = "4.0.2"
node = "22.22.1"
go = "1.26.5"

[tasks.setup]
description = "Install dependencies and create local gateway config"
run = "bin/setup"

[tasks.start]
description = "Run the web gateway in production mode"
run = "bin/start"

[tasks.dev]
description = "Run the Go web gateway in development mode on port 4567"
run = "APP_ENV=development GRIPI_BIND_HOST=127.0.0.1 go run ./cmd/gripi"

[tasks.setup-ruby]
description = "Install dependencies for the legacy Ruby gateway"
run = "bundle install"

[tasks.dev-ruby]
description = "Run the legacy Ruby gateway in development mode"
run = "RACK_ENV=development bundle exec rackup -o 127.0.0.1 -p 4567"

[tasks.start-ruby]
description = "Run the retained Ruby gateway in production mode"
run = "RACK_ENV=production bundle exec rackup -o ${GRIPI_HOST:-127.0.0.1} -p ${GRIPI_PORT:-4567}"

[tasks.test]
description = "Run the Ruby and Go test suites"
run = "bundle exec ruby -Itest -e 'Dir[\"test/*_test.rb\"].sort.each { |file| require File.expand_path(file) }' && go test ./..."

[tasks.test-go]
description = "Run the Go gateway test suite"
run = "go test ./..."

[tasks.build-go]
description = "Build the Go gateway"
run = "mkdir -p tmp && go build -o tmp/gripi ./cmd/gripi"

[tasks.benchmark-ruby]
description = "Measure the Ruby gateway under the seeded memory workload"
run = "node scripts/benchmark_gateway_memory.mjs ruby"

[tasks.benchmark-go]
description = "Measure the Go gateway under the seeded memory workload"
run = "node scripts/benchmark_gateway_memory.mjs go"

[tasks.e2e]
description = "Run the managed browser E2E contract suite"
run = "npm run test:e2e"

[tasks.desktop]
description = "Run the Electron desktop shell"
run = "npm run desktop"

[tasks.desktop-check]
description = "Run Electron desktop shell checks"
run = "npm run desktop:check"

[tasks.desktop-dist-linux]
description = "Build Linux Electron desktop shell packages"
run = "npm run dist:linux"

[tasks.desktop-dist-mac]
description = "Build macOS Electron desktop shell packages"
run = "npm run dist:mac"

[tasks.desktop-install]
description = "Build and install the Electron desktop shell for the current user"
run = "bin/install-desktop"
