services:
  gateway:
    build:
      context: .
      args:
        RUBY_VERSION: ${RUBY_VERSION:-4.0.2}
        NODE_MAJOR: ${NODE_MAJOR:-24}
        PI_VERSION: ${PI_VERSION:-latest}
        SESSION_NAMING_VERSION: ${SESSION_NAMING_VERSION:-0.2.1}
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    image: ${PI_GATEWAY_IMAGE:-pi-web-gateway:local}
    ports:
      - "${PI_GATEWAY_BIND:-127.0.0.1}:${PI_GATEWAY_PORT:-4567}:4567"
    environment:
      PI_GATEWAY_HOST: 0.0.0.0
      PI_GATEWAY_PORT: 4567
      PI_GATEWAY_ADMIN_PASSWORD: ${PI_GATEWAY_ADMIN_PASSWORD:-}
      PI_GATEWAY_PERMITTED_HOSTS: ${PI_GATEWAY_PERMITTED_HOSTS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ${PI_WORKSPACE:-./workspace}:${PI_WORKSPACE:-/work}
      - pi_data:/home/piuser/.pi
      - gateway_config:/home/piuser/.config/pi-web-gateway
      - mise_data:/home/piuser/.local/share/mise
      - mise_config:/home/piuser/.config/mise
      - mise_cache:/home/piuser/.cache/mise

  pi:
    image: ${PI_GATEWAY_IMAGE:-pi-web-gateway:local}
    build:
      context: .
      args:
        RUBY_VERSION: ${RUBY_VERSION:-4.0.2}
        NODE_MAJOR: ${NODE_MAJOR:-24}
        PI_VERSION: ${PI_VERSION:-latest}
        SESSION_NAMING_VERSION: ${SESSION_NAMING_VERSION:-0.2.1}
        USER_ID: ${HOST_UID:-1000}
        GROUP_ID: ${HOST_GID:-1000}
    profiles: ["tools"]
    working_dir: ${PI_WORKSPACE:-/work}
    command: ["pi"]
    stdin_open: true
    tty: true
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ${PI_WORKSPACE:-./workspace}:${PI_WORKSPACE:-/work}
      - pi_data:/home/piuser/.pi
      - gateway_config:/home/piuser/.config/pi-web-gateway
      - mise_data:/home/piuser/.local/share/mise
      - mise_config:/home/piuser/.config/mise
      - mise_cache:/home/piuser/.cache/mise

volumes:
  pi_data:
  gateway_config:
  mise_data:
  mise_config:
  mise_cache:
